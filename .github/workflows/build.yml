name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            # `git describe` errors when no tag exists yet — don't fail the step.
            try {
              $desc = & git describe --tags --abbrev=0 2>$null
              if ($LASTEXITCODE -eq 0 -and $desc -match "^v(.+)$") {
                $ver = $Matches[1]
              }
            } catch {}
            $global:LASTEXITCODE = 0
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build emfe/emfe.csproj -c Release -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}

      # TODO: uncomment once an emfe.Tests project exists.
      # - name: Test
      #   run: dotnet test emfe.Tests/emfe.Tests.csproj -c Release

      - name: Code Analysis
        run: >
          dotnet build emfe/emfe.csproj -c Release
          -p:EnableNETAnalyzers=true
          -p:AnalysisLevel=latest
          -warnaserror

      - name: Publish
        run: >
          dotnet publish emfe/emfe.csproj -c Release
          -r win-x64 --no-self-contained
          -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}
          -o publish

      - name: Virus scan publish output
        shell: pwsh
        run: |
          Write-Host "Scanning publish/ with Windows Defender..."
          # Signature update is best-effort; occasional failures on the
          # GitHub runner ("completed with errors") should not fail the
          # build — the scan still runs with whatever signatures are loaded.
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          Start-MpScan -ScanType CustomScan -ScanPath "$PWD\publish"
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Upload build artifact (publish output)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe_CsWPF-${{ github.sha }}
          path: publish/**
          if-no-files-found: error

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: iscc installer/setup.iss /DAppVersion=${{ steps.version.outputs.APP_VERSION }} /DArch=x64

      - name: Virus scan installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $installer = Get-ChildItem "installer/Output/emfe-WPF-Setup-*-*.exe" | Select-Object -First 1
          Write-Host "Scanning $($installer.FullName) with Windows Defender..."
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          Start-MpScan -ScanType CustomScan -ScanPath $installer.FullName
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe_CsWPF-installer-${{ github.ref_name }}
          path: installer/Output/emfe-WPF-Setup-*-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          INSTALLER=$(ls installer/Output/emfe-WPF-Setup-*-*.exe | head -1)
          INSTALLER_NAME=$(basename "$INSTALLER")
          # Delete existing release if tag was moved to a new commit.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$INSTALLER" --title "$TAG" --notes "$(cat <<EOF
          ## emfe_CsWPF ${TAG} (C#/WPF)

          emfe emulator frontend — Windows x64, .NET 10 WPF.

          ### Assets
          - **${INSTALLER_NAME}** — Windows x64 installer (Inno Setup)

          ### Installation
          Run the installer. Requires [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0); the installer checks and offers the download link if it's missing.

          After installation, drop \`emfe_plugin_*.dll\` files into the \`plugins\\\` directory inside the installation folder (or download them from
          [emfe_plugins releases](https://github.com/hha0x617/emfe_plugins/releases) which ship as a pre-structured \`plugins/\` zip).

          ### Security
          - Virus scan: **Passed** (Windows Defender, signatures updated at build time)

          ### Source Code (Apache-2.0)
          - **Repository**: [emfe_CsWPF](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)
          EOF
          )"
