name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            # `git describe` errors when no tag exists yet — don't fail the step.
            try {
              $desc = & git describe --tags --abbrev=0 2>$null
              if ($LASTEXITCODE -eq 0 -and $desc -match "^v(.+)$") {
                $ver = $Matches[1]
              }
            } catch {}
            $global:LASTEXITCODE = 0
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build emfe/emfe.csproj -c Release -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}

      # TODO: uncomment once an emfe.Tests project exists.
      # - name: Test
      #   run: dotnet test emfe.Tests/emfe.Tests.csproj -c Release

      - name: Code Analysis
        run: >
          dotnet build emfe/emfe.csproj -c Release
          -p:EnableNETAnalyzers=true
          -p:AnalysisLevel=latest
          -warnaserror

      - name: Publish
        run: >
          dotnet publish emfe/emfe.csproj -c Release
          -r win-x64 --no-self-contained
          -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}
          -o publish

      - name: Virus scan publish output
        shell: pwsh
        run: |
          Write-Host "Scanning publish/ with Windows Defender..."
          Update-MpSignature
          Start-MpScan -ScanType CustomScan -ScanPath "$PWD\publish"
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: emfe_CsWPF-${{ github.sha }}
          path: publish/**
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          cd publish
          7z a -tzip "../emfe_CsWPF-${TAG}.zip" . > /dev/null
          cd ..
          ZIP="emfe_CsWPF-${TAG}.zip"
          # Delete existing release if tag was moved to a new commit.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$ZIP" --title "$TAG" --notes "$(cat <<EOF
          ## emfe_CsWPF ${TAG} (C#/WPF)

          emfe emulator frontend — Windows x64, .NET 10 WPF.

          ### Assets
          - **${ZIP}** — unpacked binaries (requires [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0))

          ### Installation
          Extract the zip anywhere. Drop \`emfe_plugin_*.dll\` files into
          a \`plugins\\\` directory next to \`emfe.exe\`.

          ### Security
          - Virus scan: **Passed** (Windows Defender, signatures updated at build time)

          ### Source Code (Apache-2.0)
          - **Repository**: [emfe_CsWPF](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)
          EOF
          )"
