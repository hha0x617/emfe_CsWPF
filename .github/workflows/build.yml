name: Build emfe_CsWPF

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore emfe_CsWPF.sln

      - name: Build (Release)
        run: dotnet build emfe_CsWPF.sln -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish emfe/emfe.csproj
          -c Release
          -o publish
          --no-build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: emfe_CsWPF-${{ github.sha }}
          path: publish/
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: emfe_CsWPF-*
          merge-multiple: true
          path: dist

      - name: Package
        run: |
          cd dist
          zip -r ../emfe_CsWPF-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: emfe_CsWPF-*.zip
          generate_release_notes: true
